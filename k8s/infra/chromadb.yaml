apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: aion-chromadb-data
  namespace: aion
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aion-chromadb
  namespace: aion
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: aion-chromadb
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aion-chromadb
    spec:
      containers:
      - name: chromadb
        image: chromadb/chroma:latest
        ports:
        - containerPort: 8000
        env:
        - name: CHROMA_SERVER_CORS_ALLOW_ORIGINS
          value: '["*"]'
        - name: CHROMA_SERVER_DEFAULT_TENANT
          value: "default_tenant"
        livenessProbe:
          httpGet:
            path: /api/v1/health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 15
        volumeMounts:
        - mountPath: /chroma/chroma
          name: data
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: aion-chromadb-data
---
apiVersion: v1
kind: Service
metadata:
  name: aion-chromadb
  namespace: aion
spec:
  type: ClusterIP
  ports:
  - port: 8000
    targetPort: 8000
  selector:
    app.kubernetes.io/name: aion-chromadb