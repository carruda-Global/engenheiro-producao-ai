apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: aion-redis-data
  namespace: aion
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aion-redis
  namespace: aion
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: aion-redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aion-redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
        args: ["--appendonly", "yes", "--maxmemory", "512mb", "--maxmemory-policy", "allkeys-lru"]
        livenessProbe:
          exec:
            command: ["redis-cli", "ping"]
          initialDelaySeconds: 10
          periodSeconds: 10
        volumeMounts:
        - mountPath: /data
          name: data
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: aion-redis-data
---
apiVersion: v1
kind: Service
metadata:
  name: aion-redis
  namespace: aion
spec:
  type: ClusterIP
  ports:
  - port: 6379
    targetPort: 6379
  selector:
    app.kubernetes.io/name: aion-redis