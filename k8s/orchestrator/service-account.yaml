apiVersion: v1
kind: ServiceAccount
metadata:
  name: aion-orchestrator
  namespace: aion
  annotations:
    iam.gke.io/gcp-service-account: aion-orchestrator@global-engenharia-498823.iam.gserviceaccount.com
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: aion-orchestrator
  namespace: aion
rules:
- apiGroups: [""]
  resources: ["pods", "services", "configmaps", "secrets"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["pods/log"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: aion-orchestrator
  namespace: aion
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: aion-orchestrator
subjects:
- kind: ServiceAccount
  name: aion-orchestrator
  namespace: aion