apiVersion: apps/v1
kind: Deployment
metadata:
  name: aion-mcp-regulatory
  namespace: aion
  labels:
    app.kubernetes.io/name: aion-mcp-regulatory
    app.kubernetes.io/component: mcp-server
  annotations:
    apphub.cloud.google.com/functional-type: "AGENT"
    aion.agent/description: "MCP Regulatory Server - 8 tools: NR-1, LGPD, Tributario, Denuncias, Igualdade, Anticorrupcao, Onboarding, Conciliacao"
    aion.agent/capabilities: "regulatory,compliance,nr1,lgpd"
    aion.agent/llm: "gemini,deepseek"
    aion.agent/a2a-enabled: "true"
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: aion-mcp-regulatory
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aion-mcp-regulatory
        app.kubernetes.io/component: mcp-server
      annotations:
        apphub.cloud.google.com/functional-type: "AGENT"
    spec:
      serviceAccountName: aion-orchestrator
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
      containers:
      - name: mcp-regulatory
        image: gcr.io/global-engenharia-498823/aion-mcp-regulatory:7.0.0
        imagePullPolicy: Always
        ports:
        - containerPort: 8010
          name: mcp
          protocol: TCP
        env:
        - name: APP_ENV
          value: "production"
        - name: MCP_SERVER_ID
          value: "regulatory"
        envFrom:
        - secretRef:
            name: aion-secrets
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8010
          initialDelaySeconds: 20
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /tools
            port: 8010
          initialDelaySeconds: 10
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: aion-mcp-regulatory
  namespace: aion
  labels:
    app.kubernetes.io/name: aion-mcp-regulatory
  annotations:
    cloud.google.com/app-hub: "true"
    cloud.google.com/neg: '{"ingress": true}'
spec:
  type: ClusterIP
  ports:
  - port: 8010
    targetPort: 8010
    name: mcp
  selector:
    app.kubernetes.io/name: aion-mcp-regulatory