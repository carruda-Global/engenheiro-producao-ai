apiVersion: apps/v1
kind: Deployment
metadata:
  name: aion-mcp-esg
  namespace: aion
  labels:
    app.kubernetes.io/name: aion-mcp-esg
    app.kubernetes.io/component: mcp-server
  annotations:
    apphub.cloud.google.com/functional-type: "AGENT"
    aion.agent/description: "MCP ESG Server - 4 tools: ESG IFRS, Inventario Carbono, Escopo 3, CBAM"
    aion.agent/capabilities: "esg,carbon,sustainability,cbam"
    aion.agent/llm: "deepseek"
    aion.agent/a2a-enabled: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: aion-mcp-esg
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aion-mcp-esg
        app.kubernetes.io/component: mcp-server
      annotations:
        apphub.cloud.google.com/functional-type: "AGENT"
    spec:
      serviceAccountName: aion-orchestrator
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
      - name: mcp-esg
        image: gcr.io/global-engenharia-498823/aion-mcp-esg:7.0.0
        ports:
        - containerPort: 8011
          name: mcp
        env:
        - name: APP_ENV
          value: "production"
        - name: MCP_SERVER_ID
          value: "esg"
        envFrom:
        - secretRef:
            name: aion-secrets
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8011
          initialDelaySeconds: 20
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /tools
            port: 8011
          initialDelaySeconds: 10
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: aion-mcp-esg
  namespace: aion
  annotations:
    cloud.google.com/app-hub: "true"
spec:
  type: ClusterIP
  ports:
  - port: 8011
    targetPort: 8011
    name: mcp
  selector:
    app.kubernetes.io/name: aion-mcp-esg