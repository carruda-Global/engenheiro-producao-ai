apiVersion: apps/v1
kind: Deployment
metadata:
  name: aion-mcp-erp
  namespace: aion
  labels:
    app.kubernetes.io/name: aion-mcp-erp
    app.kubernetes.io/component: mcp-server
  annotations:
    apphub.cloud.google.com/functional-type: "AGENT"
    aion.agent/description: "MCP ERP Server - 10 tools: Dynamics, Agentforce, Oracle, SAP"
    aion.agent/capabilities: "erp,enterprise,dynamics,oracle,sap,agentforce"
    aion.agent/llm: "deepseek,claude"
    aion.agent/a2a-enabled: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: aion-mcp-erp
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aion-mcp-erp
        app.kubernetes.io/component: mcp-server
      annotations:
        apphub.cloud.google.com/functional-type: "AGENT"
    spec:
      serviceAccountName: aion-orchestrator
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
      - name: mcp-erp
        image: gcr.io/global-engenharia-498823/aion-mcp-erp:7.0.0
        ports:
        - containerPort: 8012
          name: mcp
        env:
        - name: APP_ENV
          value: "production"
        - name: MCP_SERVER_ID
          value: "erp"
        envFrom:
        - secretRef:
            name: aion-secrets
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8012
          initialDelaySeconds: 20
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /tools
            port: 8012
          initialDelaySeconds: 10
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: aion-mcp-erp
  namespace: aion
  annotations:
    cloud.google.com/app-hub: "true"
spec:
  type: ClusterIP
  ports:
  - port: 8012
    targetPort: 8012
    name: mcp
  selector:
    app.kubernetes.io/name: aion-mcp-erp