      - name: microsoft
        agents: [regulatory_analyst, compliance_pm, channel_agent, knowledge_agent, facilitator_agent, dev_experience]
        channel: microsoft
      - name: cross_sell
        agents: [onboarding_funcionarios, atendimento_cliente_ptbr, conciliacao_financeira]
        channel: microsoft,salesforce
      - name: dynamics
        agents: [dynamics_sales, dynamics_finance, dynamics_supply_chain, dynamics_hr, dynamics_customer_service, power_bi_compliance]
        channel: microsoft,google
      - name: agentforce
        agents: [agentforce_sdr, agentforce_field_service, agentforce_contract_intelligence, agentforce_revenue_intelligence, agentforce_sustainability]
        channel: salesforce,microsoft
      - name: oracle
        agents: [oracle_erp_compliance, oracle_hcm_regulatory, oracle_supply_chain_esg, oracle_cx_sales]
        channel: oracle,google
      - name: sap
        agents: [sap_joule_compliance, sap_predictive_maintenance, sap_cbam_export]
        channel: sap,oracle
      - name: coordination
        agents: [master_orchestrator, cross_platform_bridge]
        channel: all
      - name: intelligence
        agents: [regulatory_watch, client_intelligence, quality_critic]
        channel: all
      - name: tech
        agents: [software_engineering, sales_agent, workforce_orchestrator]
        channel: microsoft,salesforce
      - name: self_improvement
        agents: [meta_learning, ecosystem_evolution, federated_knowledge]
        channel: internal
      - name: micro
        agents: [nr1_diagnostico_rapido, lgpd_scanner, folha_equidade, contrato_review, teams_risk_monitor, meeting_minutes, pr_lgpd_checker, admissao_checklist, sales_pipeline_checker, expense_anomaly, compliance_score, lead_qualifier, code_reviewer, headcount_alert, regulatory_alert]
        channel: microsoft