    mcp_servers:
      - id: regulatory
        name: "Regulatory MCP"
        service: aion-mcp-regulatory:8010
        tools: [nr1_psicossocial, lgpd_operacional, tributario_cbs_ibs, canal_denuncias, igualdade_salarial, compliance_anticorrupcao, onboarding_funcionarios, conciliacao_financeira]
      - id: esg
        name: "ESG MCP"
        service: aion-mcp-esg:8011
        tools: [esg_ifrs_diagnostico, inventario_carbono, escopo3_fornecedores, cbam_certificate]
      - id: erp
        name: "ERP MCP"
        service: aion-mcp-erp:8012
        tools: [dynamics_sales, dynamics_finance, dynamics_hr, agentforce_sdr, oracle_erp_compliance, sap_cbam_export]
      - id: microsoft
        name: "Microsoft MCP"
        service: aion-mcp-microsoft:8013
        tools: [regulatory_analyst, compliance_pm, channel_agent, knowledge_agent, facilitator_agent, dev_experience]

    clusters:
      - name: aec_core
        agents: [spec_analyst, procurement, inventory, logistics, field_execution]
        channel: google
      - name: aec_specialized
        agents: [bim_coordinator, requirements_analyst, engineering_assistant, work_synopsis]
        channel: google
      - name: aec_compliance
        agents: [photo_intelligence, rfi_creation, compliance]
        channel: google
      - name: regulatory
        agents: [nr1_psicossocial, tributario_cbs_ibs, lgpd_operacional, esg_ifrs, inventario_carbono, escopo3_fornecedores, canal_denuncias, igualdade_salarial, compliance_anticorrupcao]
