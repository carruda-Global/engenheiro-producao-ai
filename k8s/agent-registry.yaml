      - id: pr_lgpd_checker
        name: "PR LGPD Checker"
        cluster: micro
        description: "M7 - PII em Pull Requests"
        llm: claude-api
        status: co-sell
        service: aion-orchestrator:8000
      - id: admissao_checklist
        name: "Admissão Checklist"
        cluster: micro
        description: "M8 - Checklist de admissão"
        llm: gemini-pro
        status: active
        service: aion-orchestrator:8000
      - id: sales_pipeline_checker
