        cluster: micro
        description: "M9 - Deals em risco"
        llm: deepseek-chat
        status: scheduled_q4_2026
        service: aion-orchestrator:8000
      - id: expense_anomaly
        name: "Expense Anomaly"
        cluster: micro
        description: "M10 - Anomalias em despesas"
        llm: deepseek-chat
        status: scheduled_q4_2026
        service: aion-orchestrator:8000
      - id: compliance_score
        name: "Compliance Score"
        cluster: micro
        description: "M11 - Score de compliance 0-100"
        llm: deepseek-chat
        status: active
        service: aion-orchestrator:8000
      - id: lead_qualifier
        name: "Lead Qualifier"
        cluster: micro
        description: "M12 - Qualificação de leads"
        llm: deepseek-chat
        status: active
        service: aion-orchestrator:8000
      - id: code_reviewer
        name: "Code Reviewer"
        cluster: micro
        description: "M13 - Code review de PRs"
        llm: claude-api
        status: active
        service: aion-orchestrator:8000
      - id: headcount_alert
        name: "Headcount Alert"
        cluster: micro
        description: "M14 - Alerta de sobrecarga"
        llm: claude-api
        status: active
        service: aion-orchestrator:8000
      - id: regulatory_alert
        name: "Regulatory Alert"
        cluster: micro
