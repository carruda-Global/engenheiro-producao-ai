apiVersion: v1
kind: Secret
metadata:
  name: aion-secrets
  namespace: aion
  labels:
    app.kubernetes.io/name: aion
  annotations:
    aion.secret/description: "Populado via External Secrets Operator ou manualmente"
type: Opaque
stringData:
  # LLM Keys
  DEEPSEEK_API_KEY: ""
  GEMINI_API_KEY: ""
  OPENROUTER_API_KEY: ""
  CLAUDE_API_KEY: ""

  # Supabase
  SUPABASE_URL: ""
