services:
  - type: web
    name: hmas-orchestrator
    env: docker
    repo: https://github.com/carruda-Global/engenheiro-producao-ai.git
    branch: main
    dockerfilePath: ./Dockerfile
    dockerCommand: uvicorn app.main:app --host 0.0.0.0 --port 8000
    envVars:
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: A2A_ENABLED
        value: "true"
      - key: A2A_BASE_URL
        value: https://engenheiro-producao-ai.onrender.com
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_WEBHOOK_SECRET_PRODUCTION
        sync: false
      - key: STRIPE_WEBHOOK_SECRET_TEST
        sync: false
      - key: ABACATEPAY_API_KEY
        sync: false
      - key: ABACATEPAY_WEBHOOK_SECRET
        sync: false
      - key: ABACATEPAY_SANDBOX_MODE
        value: "true"
      - key: DATABASE_URL
        sync: false
      - key: KAFKA_BOOTSTRAP_SERVERS
        sync: false
    healthCheckPath: /
    numInstances: 1

databases:
  - name: hmas-database
    plan: starter
    databaseName: hmas
    user: hmas_user
    region: ohio
