    agent_name: "NR-1 Psicossocial"
    principal: "Cristiano Arruda (CREA-SP 5071200171)"
    permissions:
      deepseek_chat: { allowed: true, constraints: [{ max_tokens: 8192 }] }
      document_read: { allowed: true, constraints: [{ max_documents: 200 }] }
      supabase_read: { allowed: true }
      supabase_insert: { allowed: true, constraints: [{ max_rows: 100 }] }
      supabase_delete: { allowed: false }
    dlp_rules:
      - { pattern: "CPF|\\d{3}\\.\\d{3}\\.\\d{3}-\\d{2}", action: "mask" }
