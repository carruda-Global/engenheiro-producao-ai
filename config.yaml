deepseek:
  api_base: https://api.deepseek.com/v1
  model: deepseek-chat
  max_tokens: 16384
  temperature: 0.3
  timeout: 120

memory:
  hybrid:
    enabled: true
    max_episodes_per_agent: 1000
    max_total_episodes: 50000
    reflection_interval: 10
  episodic:
    enabled: true
    max_size: 5000
  semantic:
    enabled: true
    knowledge_path: data/semantic_knowledge.json
  working:
    enabled: true
    ttl_seconds: 3600

rag:
  hybrid:
    enabled: true
    top_k: 5
    fusion_strategy: reciprocal_rank
    cache_size: 500
  text_retriever:
    enabled: true
    method: bm25
  graph_retriever:
    enabled: true
    max_depth: 3

evolution:
  gea:
    enabled: true
    population_size: 27
    mutation_rate: 0.1
    crossover_rate: 0.7
    selection_pressure: 0.3
    generation_interval_minutes: 60
  reflection:
    enabled: true
    pattern_analysis_interval: 5
  performance_selection:
    enabled: true
    novelty_weight: 0.3
    performance_weight: 0.7

rl:
  local:
    enabled: true
    algorithm: ppo
    learning_rate: 0.001
    discount_factor: 0.95
    clip_epsilon: 0.2
  global:
    enabled: true
    algorithm: ppo
    learning_rate: 0.0005
    discount_factor: 0.9
  federated:
    enabled: false
    sync_interval_minutes: 60
  reward:
    dimensions:
      - success_rate
      - response_time
      - cost_efficiency
      - novelty
    weights:
      success_rate: 0.4
      response_time: 0.2
      cost_efficiency: 0.3
      novelty: 0.1

monitoring:
  metrics:
    enabled: true
    prometheus_port: 9091
    collection_interval_seconds: 15
  alerts:
    response_time_threshold: 5.0
    error_rate_threshold: 0.05
    budget_usage_threshold: 0.80
    slack_webhook: ${SLACK_WEBHOOK:-}
    email_alerts: ${ALERT_EMAIL:-}
  dashboard:
    enabled: true
    refresh_interval_seconds: 5
    max_history_points: 1000
  logging:
    elasticsearch_enabled: false
    logstash_host: logstash
    logstash_port: 5000

security:
  multi_tenant:
    enabled: true
    isolation_level: schema
  rbac:
    enabled: true
    roles:
      - admin
      - manager
      - operator
      - viewer
  pii_masking:
    enabled: true
    patterns:
      - cpf
      - email
      - phone
      - credit_card
  dlp:
    enabled: true
    max_data_exposure: 1000
  audit:
    enabled: true
    hash_chain_enabled: true
    storage_path: data/audit/

rate_limiting:
  enabled: true
  requests_per_second: 100
  burst_size: 200
  per_agent_limit: 10

budget:
  per_task_default: 0.10
  per_agent_monthly: 100.0
  per_tenant_monthly: 1000.0
  alerts_enabled: true
  auto_fallback: true
  fallback_model: deepseek-chat

cache:
  embeddings:
    enabled: true
    max_size_mb: 512
    ttl_hours: 24
  responses:
    enabled: true
    max_entries: 10000
    ttl_hours: 48

agent_versioning:
  enabled: true
  snapshots_path: data/snapshots/
  max_snapshots: 50
  rollback_enabled: true

orchestrator:
  max_parallel_agents: 10
  task_timeout_seconds: 30
  circuit_breaker_threshold: 5
  circuit_breaker_reset_seconds: 60
  retry_attempts: 3
  retry_delay_seconds: 1.0

integrations:
  github:
    token: ${GITHUB_TOKEN}
    repo: ${GITHUB_REPO}
  salesforce:
    instance_url: ${SALESFORCE_URL}
    client_id: ${SALESFORCE_CLIENT_ID}
    client_secret: ${SALESFORCE_CLIENT_SECRET}
  slack:
    token: ${SLACK_TOKEN}
    channel: ${SLACK_CHANNEL}

marketplace:
  microsoft:
    enabled: true
    tenant_id: ${AZURE_TENANT_ID}
    client_id: ${AZURE_CLIENT_ID}
    client_secret: ${AZURE_CLIENT_SECRET}
    fulfillment_api_version: "2018-08-31"

