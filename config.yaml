openrouter:
  api_base: https://openrouter.ai/api/v1
  model: openai/gpt-4o-mini
  timeout: 120

deepseek:
  api_base: https://openrouter.ai/api/v1
  max_tokens: 16384
  model: openai/gpt-4o-mini
  temperature: 0.3
  timeout: 120
evolution:
  gea:
    crossover_rate: 0.7
    enabled: true
    generation_interval_minutes: 60
    mutation_rate: 0.1
    population_size: 27
    selection_pressure: 0.3
  performance_selection:
    enabled: true
    novelty_weight: 0.3
    performance_weight: 0.7
  reflection:
    enabled: true
    pattern_analysis_interval: 5
integrations:
  github:
    repo: ${GITHUB_REPO}
    token: ${GITHUB_TOKEN}
  salesforce:
    client_id: ${SALESFORCE_CLIENT_ID}
    client_secret: ${SALESFORCE_CLIENT_SECRET}
    instance_url: ${SALESFORCE_URL}
  slack:
    channel: ${SLACK_CHANNEL}
    token: ${SLACK_TOKEN}
llm_routing:
  default: openrouter
  reasoning_agents:
  - master_orchestrator
  - quality_critic
  - ecosystem_evolution
  reasoning_llm: claude-api
  sensitive_agents:
  - nr1_psicossocial
  - lgpd_operacional
  - canal_denuncias
  - igualdade_salarial
  - compliance_anticorrupcao
  - dynamics_hr
  - oracle_hcm_regulatory
  - onboarding_funcionarios
  sensitive_llm: gemini
marketplace:
  google:
    product_id: global-engenharia-498823
    project_id: global-engenharia-498823
    webhook_url: https://engenheiro-producao-ai.onrender.com/google/webhook
    pubsub_topic: ecosystem-aion-webhook
    enabled: true
  microsoft:
    client_id: ${AZURE_CLIENT_ID}
    client_secret: ${AZURE_CLIENT_SECRET}
    enabled: true
    fulfillment_api_version: '2018-08-31'
    tenant_id: ${AZURE_TENANT_ID}
memory:
  episodic:
    enabled: true
    max_size: 5000
  hybrid:
    enabled: true
    max_episodes_per_agent: 1000
    max_total_episodes: 50000
    reflection_interval: 10
  semantic:
    enabled: true
    knowledge_path: data/semantic_knowledge.json
  working:
    enabled: true
    ttl_seconds: 3600
monitoring:
  alerts:
    budget_usage_threshold: 0.8
    email_alerts: ${ALERT_EMAIL:-}
    error_rate_threshold: 0.05
    response_time_threshold: 5.0
    slack_webhook: ${SLACK_WEBHOOK:-}
  dashboard:
    enabled: true
    max_history_points: 1000
    refresh_interval_seconds: 5
  logging:
    elasticsearch_enabled: false
    logstash_host: logstash
    logstash_port: 5000
  metrics:
    collection_interval_seconds: 15
    enabled: true
    prometheus_port: 9091
orchestrator:
  circuit_breaker_reset_seconds: 60
  circuit_breaker_threshold: 5
  max_parallel_agents: 10
  retry_attempts: 3
  retry_delay_seconds: 1.0
  task_timeout_seconds: 30
rag:
  graph_retriever:
    enabled: true
    max_depth: 3
  hybrid:
    cache_size: 500
    enabled: true
    fusion_strategy: reciprocal_rank
    top_k: 5
  text_retriever:
    enabled: true
    method: bm25
rate_limiting:
  burst_size: 200
  enabled: true
  per_agent_limit: 10
  requests_per_second: 100
rl:
  federated:
    enabled: false
    sync_interval_minutes: 60
  global:
    algorithm: ppo
    discount_factor: 0.9
    enabled: true
    learning_rate: 0.0005
  local:
    algorithm: ppo
    clip_epsilon: 0.2
    discount_factor: 0.95
    enabled: true
    learning_rate: 0.001
  reward:
    dimensions:
    - success_rate
    - response_time
    - cost_efficiency
    - novelty
    weights:
      cost_efficiency: 0.3
      novelty: 0.1
      response_time: 0.2
      success_rate: 0.4
security:
  audit:
    enabled: true
    hash_chain_enabled: true
    storage_path: data/audit/
  dlp:
    enabled: true
    max_data_exposure: 1000
  multi_tenant:
    enabled: true
    isolation_level: schema
  pii_masking:
    enabled: true
    patterns:
    - cpf
    - email
    - phone
    - credit_card
  rbac:
    enabled: true
    roles:
    - admin
    - manager
    - operator
    - viewer
