version: "3.9"

services:
  orchestrator:
    build: .
    container_name: engenheiro-producao-ai
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./config.yaml:/app/config.yaml
      - ./templates:/app/templates
    command: python src/main.py --config config.yaml
    restart: unless-stopped
