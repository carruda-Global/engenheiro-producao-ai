quality:
  enabled: true
  auto_fix: true
  max_retries: 3

gates:
  coverage:
    enabled: true
    min: 80
    unit: "percent"
    severity: "warning"
  
  security_issues:
    enabled: true
    max: 0
    unit: "count"
    severity: "critical"
  
  duplication:
    enabled: true
    max: 3
    unit: "percent"
    severity: "warning"
  
  reliability_issues:
    enabled: true
    max: 0
    unit: "count"
    severity: "high"

critic:
  enabled: true
  checks:
    norma_vigente:
      enabled: true
      severity: "critical"
    completude:
      enabled: true
      severity: "high"
    consistencia_interna:
      enabled: true
      severity: "high"
    pii_masking:
      enabled: true
      severity: "critical"
    alucinacao_detector:
      enabled: true
      severity: "high"

kalibra:
  enabled: true
  metrics:
    response_time_pct: 20
    accuracy_pct: 5
    token_usage_pct: 30
  auto_revert: true
  comparison_window: "7d"
